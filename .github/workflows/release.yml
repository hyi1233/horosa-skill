name: Release Runtime

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  attestations: write
  id-token: write

jobs:
  build-release:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: ./horosa-skill
        run: uv sync --dev
      - name: Verify vendored runtime inputs
        working-directory: ./horosa-skill
        run: uv run python scripts/verify_vendor_runtime_sources.py
      - name: Verify bundled knowledge index
        working-directory: ./horosa-skill
        run: uv run python scripts/build_knowledge_index.py --check
      - name: Build runtime archives and manifest
        working-directory: ./horosa-skill
        run: bash scripts/build_runtime_release.sh
      - name: Generate SBOM
        working-directory: ./horosa-skill
        run: uv run python scripts/generate_sbom.py --project-root . --runtime-manifest dist/runtime/runtime-manifest.json --output dist/runtime/horosa-skill-sbom.json
      - name: Upload runtime artifacts
        uses: actions/upload-artifact@v4
        with:
          name: horosa-runtime-release
          path: |
            horosa-skill/dist/runtime/*.tar.gz
            horosa-skill/dist/runtime/*.zip
            horosa-skill/dist/runtime/runtime-manifest.json
            horosa-skill/dist/runtime/SHA256SUMS.txt
            horosa-skill/dist/runtime/horosa-skill-sbom.json
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            horosa-skill/dist/runtime/*.tar.gz
            horosa-skill/dist/runtime/*.zip
            horosa-skill/dist/runtime/runtime-manifest.json
            horosa-skill/dist/runtime/SHA256SUMS.txt
            horosa-skill/dist/runtime/horosa-skill-sbom.json
