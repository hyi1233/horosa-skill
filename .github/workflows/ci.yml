name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        working-directory: ./horosa-skill
        run: uv sync --dev
      - name: Run unit tests
        working-directory: ./horosa-skill
        run: uv run pytest -q
      - name: Verify README links
        working-directory: ./horosa-skill
        run: uv run python scripts/verify_readme_links.py
      - name: Verify server.json
        working-directory: ./horosa-skill
        run: uv run python scripts/verify_server_json.py
      - name: Verify bundled knowledge index
        working-directory: ./horosa-skill
        run: uv run python scripts/build_knowledge_index.py --check
      - name: Run HorosaBench local-only smoke
        working-directory: ./horosa-skill
        run: uv run python scripts/run_benchmark.py --skip-runtime
